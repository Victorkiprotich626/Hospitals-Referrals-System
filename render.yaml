services:
  - name: hospital-referrals-db
    type: pserv
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./mysql-render/Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: MYSQL_DATABASE
        value: hospital_referrals
      - key: MYSQL_USER
        value: referrals
      - key: MYSQL_PASSWORD
        sync: false
      - key: MYSQL_ROOT_PASSWORD
        sync: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - name: hospital-referrals-app
    type: web
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    healthCheckPath: /actuator/health
    envVars:
      - key: DB_HOST
        fromService:
          name: hospital-referrals-db
          type: pserv
          property: host
      - key: DB_PORT
        fromService:
          name: hospital-referrals-db
          type: pserv
          property: port
      - key: DB_NAME
        fromService:
          name: hospital-referrals-db
          type: pserv
          envVarKey: MYSQL_DATABASE
      - key: DB_USERNAME
        fromService:
          name: hospital-referrals-db
          type: pserv
          envVarKey: MYSQL_USER
      - key: DB_PASSWORD
        fromService:
          name: hospital-referrals-db
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: APP_BOOTSTRAP_SUPER_ADMIN_EMAIL
        value: superadmin@referrals.local
      - key: APP_BOOTSTRAP_SUPER_ADMIN_PASSWORD
        sync: false
      - key: APP_STORAGE_ATTACHMENTS_DIR
        value: /var/data/referral-attachments
      - key: SERVER_PORT
        value: "8080"
    disk:
      name: referral-attachments
      mountPath: /var/data
      sizeGB: 1
