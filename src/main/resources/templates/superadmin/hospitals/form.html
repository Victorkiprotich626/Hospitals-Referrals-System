<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: navbar('hospitals')}"></header>
<main class="page-shell narrow-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Tenant Management</span>
            <h1 th:text="${pageTitle}">Hospital</h1>
        </div>
    </section>

    <form th:action="@{${formAction}}" th:object="${hospitalForm}" method="post" class="card stacked-form">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

        <label>
            Hospital name
            <input type="text" th:field="*{name}" placeholder="Riverdale General Hospital">
            <small class="field-error" th:errors="*{name}"></small>
        </label>

        <label>
            Hospital code
            <input type="text" th:field="*{code}" placeholder="RGH">
            <small class="field-error" th:errors="*{code}"></small>
        </label>

        <label>
            Contact email
            <input type="email" th:field="*{contactEmail}" placeholder="admin@hospital.org">
            <small class="field-error" th:errors="*{contactEmail}"></small>
        </label>

        <label>
            Contact phone
            <input type="text" th:field="*{contactPhone}" placeholder="+254700000000">
            <small class="field-error" th:errors="*{contactPhone}"></small>
        </label>

        <label>
            Address
            <textarea th:field="*{address}" rows="3" placeholder="Physical address"></textarea>
            <small class="field-error" th:errors="*{address}"></small>
        </label>

        <label class="checkbox-row">
            <input type="checkbox" th:field="*{enabled}">
            <span>Hospital is active</span>
        </label>

        <div class="form-actions">
            <a class="secondary-button" th:href="@{/super-admin/hospitals}">Cancel</a>
            <button type="submit" class="primary-button">Save hospital</button>
        </div>
    </form>
</main>
</body>
</html>
