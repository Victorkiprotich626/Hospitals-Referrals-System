<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Doctors')}"></head>
<body>
<header th:replace="~{fragments/layout :: hospitalAdminNavbar('doctors')}"></header>
<main class="page-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Directory</span>
            <h1>Doctors</h1>
        </div>
        <a class="primary-button" th:href="@{/hospital-admin/doctors/new}">Add doctor</a>
    </section>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form method="get" th:action="@{/hospital-admin/doctors}" class="stacked-form">
            <label>
                Search doctors
                <input type="text" name="q" th:value="${q}" placeholder="Search by name, email, specialty, phone, or department">
            </label>
            <label>
                Filter by department
                <select name="departmentId">
                    <option value="">All departments</option>
                    <option th:each="department : ${departments}" th:value="${department.id}" th:text="${department.name}"
                            th:selected="${departmentId != null && departmentId == department.id}"></option>
                </select>
            </label>
            <div class="form-actions">
                <button type="submit" class="secondary-button">Apply</button>
                <a class="secondary-button" th:href="@{/hospital-admin/doctors}">Clear</a>
            </div>
        </form>
    </section>

    <section class="card">
        <table class="data-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Specialty</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(doctors)}">
                <td colspan="6" class="empty-state">No doctors have been created for this hospital yet.</td>
            </tr>
            <tr th:each="doctor : ${doctors}">
                <td>
                    <div th:text="${doctor.fullName}">Doctor Name</div>
                    <small th:text="${doctor.phoneNumber ?: 'No phone'}">No phone</small>
                </td>
                <td th:text="${doctor.email}">doctor@hospital.org</td>
                <td th:text="${doctor.department != null ? doctor.department.name : 'Unassigned'}">Department</td>
                <td th:text="${doctor.specialty ?: 'Not specified'}">Specialty</td>
                <td>
                    <span class="status-pill" th:classappend="${doctor.enabled ? ' status-active' : ' status-inactive'}"
                          th:text="${doctor.enabled ? 'Enabled' : 'Disabled'}">Enabled</span>
                </td>
                <td class="actions">
                    <a th:href="@{|/hospital-admin/doctors/${doctor.id}/edit|}">Edit</a>
                    <form th:action="@{|/hospital-admin/doctors/${doctor.id}/delete|}" method="post" class="inline-form">
                        <button type="submit" class="link-button danger-link"
                                onclick="return confirm('Delete this doctor?')">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
