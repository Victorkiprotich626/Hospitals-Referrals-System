<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: hospitalAdminNavbar('users')}"></header>
<main class="page-shell narrow-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Users</span>
            <h1 th:text="${pageTitle}">Hospital User</h1>
            <p>Create role-based accounts for referral operations inside this hospital.</p>
        </div>
    </section>

    <form th:action="${formAction}" th:object="${hospitalUserForm}" method="post" class="card stacked-form">
        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-error" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>

        <label>
            First name
            <input type="text" th:field="*{firstName}" placeholder="Mary">
            <small class="field-error" th:errors="*{firstName}"></small>
        </label>

        <label>
            Last name
            <input type="text" th:field="*{lastName}" placeholder="Kamau">
            <small class="field-error" th:errors="*{lastName}"></small>
        </label>

        <label>
            Email
            <input type="email" th:field="*{email}" placeholder="staff@hospital.org">
            <small class="field-error" th:errors="*{email}"></small>
        </label>

        <label>
            Role
            <select th:field="*{role}">
                <option value="">Select role</option>
                <option th:each="role : ${roles}" th:value="${role}" th:text="${role.name()}"></option>
            </select>
            <small class="field-error" th:errors="*{role}"></small>
        </label>

        <label>
            Department
            <select th:field="*{departmentId}">
                <option value="">No department</option>
                <option th:each="department : ${departments}" th:value="${department.id}" th:text="${department.name}"></option>
            </select>
        </label>

        <label>
            Doctor profile
            <select th:field="*{doctorProfileId}">
                <option value="">No doctor profile</option>
                <option th:each="doctor : ${doctors}" th:value="${doctor.id}" th:text="${doctor.fullName}"></option>
            </select>
        </label>

        <label>
            Password
            <input type="password" th:field="*{password}" placeholder="Required for new users">
            <small class="helper-text">Leave blank during edit to keep the current password.</small>
            <small class="field-error" th:errors="*{password}"></small>
        </label>

        <label class="checkbox-row">
            <input type="checkbox" th:field="*{enabled}">
            <span>Account is active</span>
        </label>

        <div class="form-actions">
            <a class="secondary-button" th:href="@{/hospital-admin/users}">Cancel</a>
            <button type="submit" class="primary-button">Save user</button>
        </div>
    </form>
</main>
</body>
</html>
