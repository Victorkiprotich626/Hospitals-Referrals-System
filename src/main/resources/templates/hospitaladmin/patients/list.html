<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Patients')}"></head>
<body>
<header th:replace="~{fragments/layout :: hospitalAdminNavbar('patients')}"></header>
<main class="page-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Patients</span>
            <h1>Patient registry</h1>
        </div>
        <a class="primary-button" th:href="@{/hospital-admin/patients/new}">Add patient</a>
    </section>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form method="get" th:action="@{/hospital-admin/patients}" class="stacked-form">
            <label>
                Search patients
                <input type="text" name="q" th:value="${q}" placeholder="Search by patient number, name, phone, or national ID">
            </label>
            <div class="form-actions">
                <button type="submit" class="secondary-button">Search</button>
                <a class="secondary-button" th:href="@{/hospital-admin/patients}">Clear</a>
            </div>
        </form>
    </section>

    <section class="card">
        <table class="data-table">
            <thead>
            <tr>
                <th>Patient No.</th>
                <th>Name</th>
                <th>Gender</th>
                <th>Date of birth</th>
                <th>Contact</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(patients)}">
                <td colspan="6" class="empty-state">No patients have been added for this hospital yet.</td>
            </tr>
            <tr th:each="patient : ${patients}">
                <td th:text="${patient.patientNumber}">PAT-001</td>
                <td th:text="${patient.fullName}">Patient Name</td>
                <td th:text="${patient.gender.displayName}">Gender</td>
                <td th:text="${patient.dateOfBirth}">1990-01-01</td>
                <td>
                    <div th:text="${patient.phoneNumber ?: 'No phone'}">No phone</div>
                    <small th:text="${patient.nationalId ?: 'No national ID'}">No national ID</small>
                </td>
                <td class="actions">
                    <a th:href="@{|/hospital-admin/patients/${patient.id}/edit|}">Edit</a>
                    <form th:action="@{|/hospital-admin/patients/${patient.id}/delete|}" method="post" class="inline-form">
                        <button type="submit" class="link-button danger-link"
                                onclick="return confirm('Delete this patient? This only works when there are no referrals linked.')">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
