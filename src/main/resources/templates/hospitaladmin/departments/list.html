<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Departments')}"></head>
<body>
<header th:replace="~{fragments/layout :: hospitalAdminNavbar('departments')}"></header>
<main class="page-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Directory</span>
            <h1>Departments</h1>
        </div>
        <a class="primary-button" th:href="@{/hospital-admin/departments/new}">Add department</a>
    </section>

    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <section class="card">
        <form method="get" th:action="@{/hospital-admin/departments}" class="stacked-form">
            <label>
                Search departments
                <input type="text" name="q" th:value="${q}" placeholder="Search by department name or code">
            </label>
            <div class="form-actions">
                <button type="submit" class="secondary-button">Search</button>
                <a class="secondary-button" th:href="@{/hospital-admin/departments}">Clear</a>
            </div>
        </form>
    </section>

    <section class="card">
        <table class="data-table">
            <thead>
            <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(departments)}">
                <td colspan="4" class="empty-state">No departments have been created for this hospital yet.</td>
            </tr>
            <tr th:each="department : ${departments}">
                <td th:text="${department.name}">Department</td>
                <td th:text="${department.code}">DEPT</td>
                <td>
                    <span class="status-pill" th:classappend="${department.enabled ? ' status-active' : ' status-inactive'}"
                          th:text="${department.enabled ? 'Enabled' : 'Disabled'}">Enabled</span>
                </td>
                <td class="actions">
                    <a th:href="@{|/hospital-admin/departments/${department.id}/edit|}">Edit</a>
                    <form th:action="@{|/hospital-admin/departments/${department.id}/delete|}" method="post" class="inline-form">
                        <button type="submit" class="link-button danger-link"
                                onclick="return confirm('Delete this department?')">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
