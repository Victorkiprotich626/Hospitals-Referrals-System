<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Sign In')}"></head>
<body class="login-page">
<main class="login-shell">
    <section class="login-panel">
        <div class="login-header">
            <span class="eyebrow">Secure Access</span>
            <h1>Hospital Referrals Platform</h1>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            Invalid email or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            You have been signed out.
        </div>

        <form th:action="@{/login}" method="post" class="card stacked-form">
            <label>
                Email
                <input type="email" name="username" placeholder="you@hospital.org" required autofocus>
            </label>
            <label>
                Password
                <input type="password" name="password" placeholder="Password" required>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="remember-me">
                <span>Keep me signed in on this device</span>
            </label>
            <button type="submit" class="primary-button">Sign In</button>
        </form>

        <div class="login-footer">
            <p>Bootstrap account: <strong>superadmin@referrals.local</strong></p>
            <p>Temporary password: <strong>ChangeMe123!</strong></p>
        </div>
    </section>
</main>
</body>
</html>
