<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Notifications')}"></head>
<body>
<th:block th:switch="${workspaceRole}">
    <th:block th:case="'SUPER_ADMIN'">
        <header th:replace="~{fragments/layout :: navbar('')}"></header>
    </th:block>
    <th:block th:case="'HOSPITAL_ADMIN'">
        <header th:replace="~{fragments/layout :: hospitalAdminNavbar('')}"></header>
    </th:block>
    <th:block th:case="'REFERRAL_OFFICER'">
        <header th:replace="~{fragments/layout :: referralOfficerNavbar('')}"></header>
    </th:block>
    <th:block th:case="'DOCTOR'">
        <header th:replace="~{fragments/layout :: doctorNavbar('')}"></header>
    </th:block>
    <th:block th:case="'VIEWER'">
        <header th:replace="~{fragments/layout :: viewerNavbar('')}"></header>
    </th:block>
    <th:block th:case="*">
        <header th:replace="~{fragments/layout :: navbar('')}"></header>
    </th:block>
</th:block>
<main class="page-shell">
    <section class="page-header">
        <div>
            <span class="eyebrow">Notifications</span>
            <h1>Inbox</h1>
            <p>Recent system alerts about referral activity, routing, documents, and status changes.</p>
            <p><a th:href="${workspaceHome}" th:text="${'Back to ' + workspaceLabel}">Back to dashboard</a></p>
        </div>
        <form th:action="@{/notifications/read-all}" method="post" class="inline-form">
            <button type="submit" class="secondary-button">Mark all read</button>
        </form>
    </section>

    <section class="card">
        <form method="get" th:action="@{/notifications}" class="stacked-form">
            <label>
                Search notifications
                <input type="text" name="q" th:value="${q}" placeholder="Search by title, message, or type">
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="unreadOnly" value="true" th:checked="${unreadOnly}">
                <span>Show unread only</span>
            </label>
            <div class="form-actions">
                <button type="submit" class="secondary-button">Apply</button>
                <a class="secondary-button" th:href="@{/notifications}">Clear</a>
            </div>
        </form>
    </section>

    <section class="card">
        <div class="notification-list">
            <a class="notification-item" th:each="notification : ${notifications}"
               th:href="@{|/notifications/${notification.id}|}"
               th:classappend="${notification.unread} ? ' unread-notification' : ''">
                <div class="notification-content">
                    <div class="timeline-meta">
                        <strong th:text="${notification.title}">Notification title</strong>
                        <span th:text="${#temporals.format(notification.createdAt, 'yyyy-MM-dd HH:mm')}">2026-04-22</span>
                    </div>
                    <p th:text="${notification.message}">Notification message</p>
                    <small th:text="${notification.type.displayName}">Type</small>
                </div>
                <span class="notification-pill" th:if="${notification.unread}">Unread</span>
            </a>
            <p th:if="${#lists.isEmpty(notifications)}" class="empty-state">No notifications yet.</p>
        </div>
    </section>
</main>
</body>
</html>
