  <text x="128" y="500" font-family="Georgia, serif" font-size="34" fill="#18333B" font-weight="700">Hospital-to-hospital progression</text>

  <line x1="192" y1="570" x2="884" y2="570" stroke="#BFD2CF" stroke-width="6"/>

  <circle cx="192" cy="570" r="26" fill="#0E6B68"/>
  <circle cx="538" cy="570" r="26" fill="#0E6B68"/>
