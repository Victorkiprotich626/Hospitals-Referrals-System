  <text x="1395" y="316" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" fill="#285F9C" font-weight="700">Outcome: Admitted</text>

  <rect x="96" y="408" width="954" height="386" rx="30" fill="#FFFFFF" stroke="#E6ECEA"/>
  <rect x="1080" y="408" width="416" height="386" rx="30" fill="#FFFFFF" stroke="#E6ECEA"/>

