  <text x="1144" y="678" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#183740" font-weight="700">Final outcome</text>
  <text x="1144" y="708" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#2F7C41">Admitted for specialist inpatient care</text>
  <rect x="1114" y="744" width="348" height="86" rx="22" fill="#F7FBFA"/>
  <text x="1144" y="782" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#183740" font-weight="700">Clinical summary</text>
  <text x="1144" y="812" font-family="Segoe UI, Arial, sans-serif" font-size="18" fill="#6D7D82">Journey completed after multi-hospital escalation and accepted specialist review.</text>
