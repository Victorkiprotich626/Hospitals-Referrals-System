      <stop stop-color="#EEF7F4"/>
      <stop offset="1" stop-color="#FBF5EB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0B3644" flood-opacity=".12"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="86" y="50" width="1428" height="800" rx="34" fill="#FCFBF8" filter="url(#shadow)"/>

